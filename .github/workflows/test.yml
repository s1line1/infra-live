name: Github Actions CI test

on:
  workflow_call:
    inputs:
      command:
        description: command 
        type: string
    outputs:
      host_ips:
        value: ${{ jobs.config_credentials.outputs.host_ips }}

permissions:
  id-token: write
  contents: read
    
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - run: | 
          echo "Hello, World!"
          echo "${{ inputs.command }}"

  config_credentials:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    needs: test
    outputs:
      host_ips: ${{ steps.tf-outputs.outputs.ips }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::361995292965:role/github-actions-terraform-role
          aws-region: us-east-1
      
      - name: Verify AWS credentials  
        run: |
          IDENTITY=$(aws sts get-caller-identity --output json)
          ACCOUNT=$(echo "$IDENTITY" | jq -r '.Account')
          if [ "$ACCOUNT" != "361995292965" ]; then
            echo "::error::Expected account 361995292965 but got $ACCOUNT"
            exit 1
          fi
          echo "AWS credentials verified successfully"

      - name: print current folder
        run: |
          pwd
          ls

      - name: terraform ${{ inputs.command }}
        run: |
          cd services/springboot-demo-A/dev/aws
          terraform init
          if [ "${{ inputs.command }}" = "apply" ]; then
            terraform plan
          fi
          terraform ${{ inputs.command }} -auto-approve

      - name: parse terraform outputs
        id: tf-outputs
        run: |
          cd services/springboot-demo-A/dev/aws
          IPS=$(terraform output -json instance_ip | jq -r 'to_entries | map(.value) | join(",")')
          echo "ips=$IPS" >> $GITHUB_OUTPUT
        
