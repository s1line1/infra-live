name: Github Actions CI test

on:
  workflow_dispatch:
    inputs:
      command:
        description: command 
        type: string
      

permissions:
  id-token: write
  contents: read
    
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - run: | 
          echo "Hello, World!"
          echo "${{ inputs.command }}"

  config_credentials:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::361995292965:role/github-actions-terraform-role
          aws-region: us-east-1
      
      - name: Verify AWS credentials  
        run: |
          IDENTITY=$(aws sts get-caller-identity --output json)
          ACCOUNT=$(echo "$IDENTITY" | jq -r '.Account')
          if [ "$ACCOUNT" != "361995292965" ]; then
            echo "::error::Expected account 361995292965 but got $ACCOUNT"
            exit 1
          fi
          echo "AWS credentials verified successfully"

      - name: print current folder
        run: |
          pwd
          ls

      - name: terraform ${{ inputs.command }}
        run: |
          cd services/springboot-demo-A/dev/aws
          terraform init
          terraform ${{ inputs.command }} -auto-approve
    